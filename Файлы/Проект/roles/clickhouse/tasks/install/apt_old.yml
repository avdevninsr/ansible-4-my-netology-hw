---
#Main installation actions
#https://clickhouse.com/docs/en/getting-started/#installation

- name: Preparing
  command: "sudo apt-get install -y apt-transport-https ca-certificates curl gnupg"
  register: stdio_output

- name: Key for repo
  command: "curl -fsSL https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key | sudo gpg --dearmor | sudo tee /usr/share/keyrings/clickhouse-keyring.gpg"
  register: stdout
  
- name: Repo
  command: 'echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg arch=amd64] https://packages.clickhouse.com/deb stable main" | sudo tee /etc/apt/sources.list.d/clickhouse.list'
  register: stdout
  
- name: Apt update
  command: "sudo apt-get update -y"
  register: stdout

- name: Install by APT | Package installation
  apt:
    name: "{{ clickhouse_package | map('regex_replace', '$', '=' + clickhouse_version) | list }}"
    state: present
    update_cache: true
  become: true
  when: clickhouse_version != 'latest'
  tags: [install]

- name: Install by APT | Package installation
  apt:
    name: "{{ clickhouse_package }}"
    state: "{{ clickhouse_version }}"
    update_cache: true
  become: true
  when: clickhouse_version == 'latest'
  tags: [install]

- name: Hold specified version during APT upgrade | Package installation
  become: true
  copy:
    dest: "/etc/apt/preferences.d/fixed-{{ item }}"
    content: |
      Package: {{ item }}
      Pin: release a=now
      Pin-Priority: 1001
  loop: "{{ clickhouse_package }}"
